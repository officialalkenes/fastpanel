<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FastPanel</title>
  <link rel="stylesheet" href="{{ mount_path }}/static/toolbar.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0d0d1a;
      color: #e0e0e0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 13px;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ──────────────────────────────────────────────────────── */
    #fp-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 16px;
      height: 44px;
      min-height: 44px;
      background: #1a1a2e;
      border-bottom: 2px solid #e94560;
      flex-shrink: 0;
    }

    #fp-header .fp-logo-mark {
      color: #e94560;
      font-size: 18px;
      line-height: 1;
    }

    #fp-header .fp-title {
      font-weight: 700;
      font-size: 14px;
      color: #fff;
      letter-spacing: 0.02em;
    }

    #fp-header .fp-subtitle {
      font-size: 11px;
      color: #9e9e9e;
    }

    #fp-header .fp-spacer { flex: 1; }

    #fp-refresh-btn {
      background: rgba(233, 69, 96, 0.15);
      color: #e94560;
      border: 1px solid rgba(233, 69, 96, 0.3);
      border-radius: 4px;
      padding: 4px 12px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }

    #fp-refresh-btn:hover { background: rgba(233, 69, 96, 0.25); }

    #fp-auto-refresh {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      color: #9e9e9e;
      cursor: pointer;
      user-select: none;
    }

    #fp-auto-refresh input { cursor: pointer; accent-color: #e94560; }

    /* ── Body layout ─────────────────────────────────────────────────── */
    #fp-body {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── Request sidebar ─────────────────────────────────────────────── */
    #fp-sidebar {
      width: 300px;
      min-width: 240px;
      max-width: 400px;
      background: #1a1a2e;
      border-right: 1px solid #2a2a4e;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      flex-shrink: 0;
    }

    #fp-sidebar-header {
      padding: 8px 12px;
      border-bottom: 1px solid #2a2a4e;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    #fp-sidebar-header span {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #9e9e9e;
    }

    #fp-request-count {
      font-size: 10px;
      color: #9e9e9e;
      background: rgba(255,255,255,0.07);
      padding: 1px 6px;
      border-radius: 10px;
    }

    #fp-request-list {
      flex: 1;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: #2a2a4e transparent;
    }

    #fp-request-list::-webkit-scrollbar { width: 5px; }
    #fp-request-list::-webkit-scrollbar-track { background: transparent; }
    #fp-request-list::-webkit-scrollbar-thumb { background: #2a2a4e; border-radius: 3px; }

    .fp-req-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 12px;
      border-bottom: 1px solid rgba(255,255,255,0.04);
      cursor: pointer;
      transition: background 0.1s;
    }

    .fp-req-row:hover { background: rgba(255,255,255,0.04); }
    .fp-req-row.fp-req-active { background: #0f3460; border-left: 3px solid #e94560; padding-left: 9px; }

    .fp-req-method {
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 10px;
      font-weight: 700;
      padding: 1px 5px;
      border-radius: 3px;
      flex-shrink: 0;
      min-width: 38px;
      text-align: center;
    }

    .fp-method-GET    { background: rgba(46, 213, 115, 0.15); color: #2ed573; }
    .fp-method-POST   { background: rgba(116, 185, 255, 0.15); color: #74b9ff; }
    .fp-method-PUT    { background: rgba(250, 177, 160, 0.15); color: #fab1a0; }
    .fp-method-PATCH  { background: rgba(253, 203, 110, 0.15); color: #fdcb6e; }
    .fp-method-DELETE { background: rgba(255, 71, 87, 0.15); color: #ff4757; }
    .fp-method-other  { background: rgba(158, 158, 158, 0.15); color: #9e9e9e; }

    .fp-req-path {
      flex: 1;
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 11px;
      color: #e0e0e0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .fp-req-status {
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 10px;
      font-weight: 700;
      flex-shrink: 0;
    }

    .fp-status-2xx { color: #2ed573; }
    .fp-status-3xx { color: #74b9ff; }
    .fp-status-4xx { color: #fdcb6e; }
    .fp-status-5xx { color: #ff4757; }
    .fp-status-0   { color: #9e9e9e; }

    .fp-req-ms {
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 10px;
      color: #9e9e9e;
      flex-shrink: 0;
    }

    /* ── Main panel area ─────────────────────────────────────────────── */
    #fp-main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: #16213e;
    }

    /* tab bar */
    #fp-main-tabs {
      display: flex;
      align-items: center;
      height: 36px;
      min-height: 36px;
      background: #1a1a2e;
      border-bottom: 1px solid #2a2a4e;
      overflow-x: auto;
      scrollbar-width: none;
      flex-shrink: 0;
    }

    #fp-main-tabs::-webkit-scrollbar { display: none; }

    /* main panel content */
    #fp-main-content {
      flex: 1;
      overflow-y: auto;
      padding: 14px 18px;
      scrollbar-width: thin;
      scrollbar-color: #2a2a4e transparent;
    }

    #fp-main-content::-webkit-scrollbar { width: 6px; }
    #fp-main-content::-webkit-scrollbar-track { background: transparent; }
    #fp-main-content::-webkit-scrollbar-thumb { background: #2a2a4e; border-radius: 3px; }

    /* empty / loading states */
    .fp-placeholder {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      gap: 10px;
      color: #9e9e9e;
    }

    .fp-placeholder .fp-placeholder-icon { font-size: 36px; opacity: 0.4; }
    .fp-placeholder p { font-size: 13px; }
    .fp-placeholder small { font-size: 11px; opacity: 0.6; }

    .fp-spinner {
      width: 20px; height: 20px;
      border: 2px solid #2a2a4e;
      border-top-color: #e94560;
      border-radius: 50%;
      animation: fp-spin 0.8s linear infinite;
    }

    @keyframes fp-spin { to { transform: rotate(360deg); } }

    /* ── Tab bar (panel switcher) ───────────────────────────────────────── */
    /* toolbar.css scopes .fp-tab styles to #fastpanel-toolbar; we redefine  */
    /* them here so the debugger page is fully self-contained.               */
    .fp-tab {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 0 12px;
      height: 100%;
      font-size: 12px;
      font-weight: 500;
      color: #9e9e9e;
      cursor: pointer;
      white-space: nowrap;
      border-right: 1px solid #2a2a4e;
      transition: background 0.15s, color 0.15s;
      flex-shrink: 0;
      user-select: none;
    }

    .fp-tab:hover {
      background: #16213e;
      color: #e0e0e0;
    }

    .fp-tab.fp-tab-active {
      background: #16213e;
      color: #fff;
      border-bottom: 2px solid #e94560;
    }

    .fp-tab-title {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .fp-tab-badge {
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 10px;
      background: rgba(255,255,255,0.1);
      padding: 1px 5px;
      border-radius: 3px;
      color: #e0e0e0;
    }

    /* ── Panel content ──────────────────────────────────────────────────── */
    /* ensure panel styles apply here too (toolbar.css scopes to #fastpanel-toolbar) */
    .fp-main-content-inner h3 {
      font-size: 11px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.08em; color: #9e9e9e;
      margin-bottom: 8px; padding-bottom: 6px;
      border-bottom: 1px solid #2a2a4e;
    }

    .fp-table {
      width: 100%; border-collapse: collapse; font-size: 12px;
    }
    .fp-table th {
      text-align: left; padding: 5px 8px; color: #9e9e9e;
      font-size: 11px; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.05em; border-bottom: 1px solid #2a2a4e;
    }
    .fp-table td {
      padding: 5px 8px; border-bottom: 1px solid rgba(255,255,255,0.03);
      vertical-align: top; font-family: 'SF Mono','Fira Code',monospace;
      font-size: 11px; color: #e0e0e0;
    }
    .fp-table tr:last-child td { border-bottom: none; }
    .fp-table tr:hover td { background: rgba(255,255,255,0.03); }
    .fp-kv td:first-child { color: #9e9e9e; width: 30%; word-break: break-word; }
    .fp-kv td:last-child { color: #e0e0e0; word-break: break-all; }

    .fp-query-block {
      margin-bottom: 10px; border: 1px solid #2a2a4e;
      border-radius: 6px; overflow: hidden;
    }
    .fp-query-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 6px 10px; background: #0f3460; font-size: 11px; gap: 12px;
    }
    .fp-query-duration { font-family: 'SF Mono',monospace; font-weight: 700; color: #2ed573; }
    .fp-query-duration.fp-slow { color: #ff4757; }
    .fp-query-location { color: #9e9e9e; font-family: 'SF Mono',monospace; font-size: 10px; margin-left: auto; }
    .fp-query-sql {
      padding: 8px 10px; background: #0a0a1a;
      font-family: 'SF Mono','Fira Code',monospace; font-size: 11px;
      line-height: 1.6; color: #cdd6f4; white-space: pre-wrap; word-break: break-all;
    }
    .fp-sql-keyword { color: #89b4fa; font-weight: 700; }
    .fp-query-block.fp-slow-query { border-color: #ff4757; }
    .fp-query-block.fp-slow-query .fp-query-header { background: rgba(255,71,87,0.15); }

    .fp-perf-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; margin-bottom: 12px; }
    .fp-perf-card { background: #0f3460; border-radius: 6px; padding: 10px 14px; text-align: center; }
    .fp-perf-value { font-family: 'SF Mono',monospace; font-size: 22px; font-weight: 700; color: #fff; display: block; }
    .fp-perf-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.06em; color: #9e9e9e; margin-top: 3px; display: block; }

    .fp-log-record { display: flex; gap: 8px; align-items: flex-start; padding: 5px 0; border-bottom: 1px solid rgba(255,255,255,0.03); font-size: 12px; }
    .fp-log-record:last-child { border-bottom: none; }
    .fp-log-level { font-family: 'SF Mono',monospace; font-size: 10px; font-weight: 700; padding: 1px 5px; border-radius: 3px; flex-shrink: 0; min-width: 52px; text-align: center; }
    .fp-log-level.WARNING  { background: rgba(255,165,2,0.2); color: #ffa502; }
    .fp-log-level.ERROR    { background: rgba(255,71,87,0.2); color: #ff4757; }
    .fp-log-level.CRITICAL { background: rgba(255,71,87,0.35); color: #ff4757; }
    .fp-log-body { flex: 1; min-width: 0; }
    .fp-log-message { color: #e0e0e0; word-break: break-word; }
    .fp-log-location { font-family: 'SF Mono',monospace; font-size: 10px; color: #9e9e9e; margin-top: 2px; }
    .fp-log-exc { font-family: 'SF Mono',monospace; font-size: 10px; color: #ff4757; margin-top: 4px; white-space: pre-wrap; word-break: break-all; }

    .fp-cache-stats { display: flex; gap: 10px; margin-bottom: 12px; flex-wrap: wrap; }
    .fp-cache-stat { background: #0f3460; border-radius: 6px; padding: 6px 12px; font-size: 11px; display: flex; flex-direction: column; align-items: center; }
    .fp-cache-stat-value { font-family: 'SF Mono',monospace; font-size: 18px; font-weight: 700; color: #fff; }
    .fp-cache-stat-label { font-size: 10px; color: #9e9e9e; text-transform: uppercase; letter-spacing: 0.05em; }
    .fp-op-get  { color: #2ed573; }
    .fp-op-set  { color: #74b9ff; }
    .fp-op-del  { color: #ff4757; }
    .fp-op-miss { color: #ffa502; }

    .fp-empty { color: #9e9e9e; font-size: 13px; text-align: center; padding: 24px 0; }
  </style>
</head>
<body>

  <!-- Header -->
  <div id="fp-header">
    <span class="fp-logo-mark">⚡</span>
    <span class="fp-title">FastPanel</span>
    <span class="fp-subtitle">Request Inspector</span>
    <div class="fp-spacer"></div>
    <label id="fp-auto-refresh">
      <input type="checkbox" id="fp-auto-refresh-check" checked>
      Auto-refresh
    </label>
    <button id="fp-refresh-btn">Refresh</button>
  </div>

  <!-- Body: sidebar + main -->
  <div id="fp-body">

    <!-- Left: request list -->
    <div id="fp-sidebar">
      <div id="fp-sidebar-header">
        <span>Requests</span>
        <span id="fp-request-count">0</span>
      </div>
      <div id="fp-request-list">
        <div class="fp-placeholder">
          <div class="fp-spinner"></div>
          <p>Loading…</p>
        </div>
      </div>
    </div>

    <!-- Right: panel detail -->
    <div id="fp-main">
      <div id="fp-main-tabs"></div>
      <div id="fp-main-content">
        <div class="fp-placeholder">
          <span class="fp-placeholder-icon">⚡</span>
          <p>Select a request to inspect it.</p>
          <small>Make API calls to your app — they will appear here automatically.</small>
        </div>
      </div>
    </div>

  </div>

  <script>
    window.__FP_MOUNT_PATH__ = "{{ mount_path }}";
  </script>
  <script src="{{ mount_path }}/static/debugger.js"></script>
</body>
</html>
